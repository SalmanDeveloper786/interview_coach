<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Coach AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <!-- Lucide icons for clean, modern iconography -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Cinematic Loader Overlay -->
    <div id="reveal-screen" class="reveal-wrapper">
        <div class="mic-split-container" id="enter-trigger" title="Click to Initialize">
            <!-- Left Half of Mic -->
            <div class="mic-half left">
                <svg viewBox="0 0 24 24" width="80" height="80" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 3 3" />
                    <path d="M19 10v2a7 7 0 0 1-7 7" />
                    <line x1="12" y1="19" x2="12" y2="22" />
                    <line x1="8" y1="22" x2="12" y2="22" />
                </svg>
            </div>
            <!-- Right Half of Mic -->
            <div class="mic-half right">
                <svg viewBox="0 0 24 24" width="80" height="80" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 5v7a3 3 0 0 0 3-3V5a3 3 0 0 0-3-3" />
                    <path d="M12 19a7 7 0 0 0 7-7v-2" />
                    <line x1="12" y1="22" x2="16" y2="22" />
                </svg>
            </div>
            <div id="particle-zone"></div>
            <div class="mic-glow"></div>
        </div>
    </div>

    <!-- Main Dashboard Application -->
    <div id="dashboard-wrapper" class="dashboard-wrapper hidden-initial">
        <!-- Top Navigation Bar -->
    <nav class="glass-nav">
        <div class="nav-content">
            <div class="logo">
                <i data-lucide="brain-circuit"></i>
                <span>Interview Coach</span>
            </div>
            <div class="user-actions">
                <span class="user-email">{{ user }}</span>
                <a href="/logout" class="btn-logout"><i data-lucide="log-out"></i> Logout</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <!-- Control Panel -->
        <section class="control-panel">
            <div class="status-indicator">
                <canvas id="audio-meter" width="40" height="20" style="display: none; margin-right: 8px;"></canvas>
                <div class="pulse-ring" id="recording-pulse" style="display: none;"></div>
                <span id="status-text">Ready to Listen</span>
            </div>
            <button id="toggle-listen-btn" class="btn-listen btn-primary">
                <i data-lucide="mic"></i>
                <span id="btn-text">Start Listening</span>
            </button>
        </section>

        <!-- Transcription Area -->
        <section class="transcription-container glass-panel">
            <div class="panel-header">
                <i data-lucide="message-square"></i>
                <h2>Transcribed Question</h2>
            </div>
            <div class="transcription-box" id="transcription-box">
                <p class="placeholder-text">The interviewer's transcribed speech will appear here...</p>
            </div>
        </section>

        <!-- AI Suggestion Area -->
        <section class="suggestion-container glass-panel highlight-panel">
            <div class="panel-header suggestion-header">
                <div class="title-wrap">
                    <i data-lucide="zap"></i>
                    <h2>Suggested Answer</h2>
                </div>
                <div class="processing-indicator" id="processing-indicator">
                    <div class="dot-typing"></div>
                    <span>AI Processing...</span>
                </div>
            </div>
            <div class="suggestion-box" id="suggestion-box">
                <p class="placeholder-text">AI recommendations will stream here in real-time...</p>
            </div>
        </section>
    </main>
    </div> <!-- /dashboard-wrapper -->

    <!-- Background glow effects -->
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <script src="/static/app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
